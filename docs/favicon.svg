<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hexagon ring (benzene / graphene motif) -->
  <polygon points="16,7 24,12 24,20 16,25 8,20 8,12"
           fill="none" stroke="#047857" stroke-width="2" stroke-linejoin="round"/>

  <!-- Inner dashed ring (double-bond effect) -->
  <polygon points="16,10 21.5,13.5 21.5,19.5 16,23 10.5,19.5 10.5,13.5"
           fill="none" stroke="#059669" stroke-width="1"
           stroke-linejoin="round" stroke-dasharray="3 2" opacity="0.8"/>

  <!-- Leaf sprouting from top vertex -->
  <path d="M16 7 C19 1 24 1 22 5 C20 8 17 8 16 7Z" fill="#059669"/>
  <path d="M16 7 C13 1 8 1 10 5 C12 8 15 8 16 7Z" fill="#059669" opacity="0.85"/>

  <!-- Centre dot -->
  <circle cx="16" cy="16" r="1.8" fill="#047857"/>
</svg>
